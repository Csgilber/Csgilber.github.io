<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windham Dental Group — Front Desk Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #15324b;
    --navy-soft: #1c3d5a;
    --teal: #2a8c8c;
    --teal-dark: #1f6d6d;
    --teal-bright: #34a3a3;
    --ink: #14242f;
    --muted: #6b7c89;
    --line: #e6edf0;
    --bg: #eef3f5;
    --card: #ffffff;
    --tint-teal: #dcefef;
    --tint-teal-ink: #1c6d6d;
    --tint-navy: #e0e8f0;
    --tint-navy-ink: #234766;
    --tint-sand: #f3ebdd;
    --tint-sand-ink: #8a6d3b;
    --tint-rose: #f1e3e6;
    --tint-rose-ink: #9a5566;
    --alert: #c0392b;
    --alert-bg: #fbe9e7;
    --radius-sm: 16px;
    --shadow-card: 0 2px 10px rgba(21,50,75,0.06);
    --font: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  /* Page background — only visible in standalone demo. In an iframe the shell fills the frame. */
  body {
    font-family: var(--font);
    background: #d4dde2;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  /* The widget itself — fixed phone width for the demo; fills the iframe on a live site. */
  .shell {
    width: 400px;
    height: 720px;
    max-width: 100%;
    max-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    border-radius: 26px;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(21,50,75,0.28);
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
    flex: none;
  }

  .bar { display: flex; align-items: center; gap: 11px; padding: 16px 18px 14px; flex-shrink: 0; }
  .avatar {
    width: 40px; height: 40px; border-radius: 13px;
    background: linear-gradient(140deg, var(--teal-bright), var(--navy));
    display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 17px;
    box-shadow: 0 4px 12px rgba(42,140,140,0.32); flex-shrink: 0;
  }
  .bar-text h1 { font-size: 15px; font-weight: 700; line-height: 1.1; letter-spacing: -0.01em; }
  .bar-text p { font-size: 11.5px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #34c759; box-shadow: 0 0 0 3px rgba(52,199,89,0.16); }
  .bar-action {
    margin-left: auto; border: none; background: var(--card);
    width: 34px; height: 34px; border-radius: 11px; color: var(--navy); cursor: pointer;
    display: grid; place-items: center; box-shadow: var(--shadow-card);
    transition: transform .15s, background .15s;
  }
  .bar-action:hover { background: var(--navy); color: #fff; }
  .bar-action:active { transform: scale(0.94); }

  .welcome {
    flex: 1; min-height: 0; overflow-y: auto; padding: 8px 18px 18px;
    display: flex; flex-direction: column; animation: rise .5s cubic-bezier(.2,.8,.2,1);
  }
  .welcome.hide { display: none; }
  .hello { font-size: 27px; line-height: 1.12; font-weight: 800; letter-spacing: -0.025em; color: var(--navy); margin: 10px 2px 4px; }
  .hello .accent { color: var(--teal); }
  .sub { font-size: 13.5px; color: var(--muted); margin: 0 2px 18px; line-height: 1.5; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
  .qcard {
    border: none; text-align: left; cursor: pointer; border-radius: var(--radius-sm);
    padding: 15px 14px 16px; display: flex; flex-direction: column; gap: 12px;
    min-height: 104px; font-family: var(--font);
    transition: transform .16s cubic-bezier(.2,.8,.2,1), box-shadow .16s;
  }
  .qcard:hover { transform: translateY(-3px); box-shadow: var(--shadow-card); }
  .qcard:active { transform: translateY(0) scale(.98); }
  .qcard .ic { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; background: rgba(255,255,255,0.6); }
  .qcard .ic svg { width: 19px; height: 19px; }
  .qcard .lbl { font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.25; }
  .c-teal { background: var(--tint-teal); color: var(--tint-teal-ink); }
  .c-navy { background: var(--tint-navy); color: var(--tint-navy-ink); }
  .c-sand { background: var(--tint-sand); color: var(--tint-sand-ink); }
  .c-rose { background: var(--tint-rose); color: var(--tint-rose-ink); }

  .estrip {
    margin-top: 11px; border: 1px solid var(--line); background: var(--card);
    border-radius: var(--radius-sm); padding: 13px 15px; display: flex; align-items: center; gap: 11px;
    cursor: pointer; text-align: left; width: 100%; font-family: var(--font); transition: border-color .15s;
  }
  .estrip:hover { border-color: var(--teal); }
  .estrip .ic { width: 32px; height: 32px; border-radius: 9px; background: var(--tint-rose); color: var(--tint-rose-ink); display: grid; place-items: center; flex-shrink: 0; }
  .estrip .ic svg { width: 17px; height: 17px; }
  .estrip-txt b { font-size: 13px; font-weight: 700; color: var(--ink); display: block; }
  .estrip-txt span { font-size: 11px; color: var(--muted); }
  .estrip .chev { margin-left: auto; color: var(--muted); }

  .chatwrap { flex: 1; min-height: 0; display: none; flex-direction: column; }
  .chatwrap.show { display: flex; animation: rise .4s cubic-bezier(.2,.8,.2,1); }
  .chat { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 18px 6px; display: flex; flex-direction: column; gap: 11px; }
  .msg {
    max-width: 84%; padding: 11px 14px; font-size: 13.5px; line-height: 1.5;
    border-radius: 17px; white-space: pre-wrap; word-wrap: break-word;
    animation: pop .28s cubic-bezier(.2,.8,.2,1);
  }
  .msg.bot { background: var(--card); color: var(--ink); align-self: flex-start; border-bottom-left-radius: 5px; box-shadow: var(--shadow-card); }
  .msg.user { background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: #fff; align-self: flex-end; border-bottom-right-radius: 5px; box-shadow: 0 4px 12px rgba(42,140,140,0.28); }
  .msg a { color: var(--teal-dark); font-weight: 700; }
  .msg.user a { color: #fff; }

  /* #3 — emergency action buttons */
  .emergency-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .ecall {
    display: flex; align-items: center; gap: 10px; text-decoration: none;
    padding: 12px 14px; border-radius: 12px; font-weight: 700; font-size: 14px; font-family: var(--font);
  }
  .ecall.is-911 { background: var(--alert); color: #fff; }
  .ecall.is-office { background: var(--navy); color: #fff; }
  .ecall svg { width: 18px; height: 18px; flex-shrink: 0; }
  .ecall small { display: block; font-weight: 500; font-size: 11px; opacity: .85; margin-top: 1px; }

  .typing { align-self: flex-start; display: flex; gap: 4px; padding: 13px 15px; background: var(--card); border-radius: 17px; border-bottom-left-radius: 5px; box-shadow: var(--shadow-card); }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: blink 1.3s infinite; }
  .typing span:nth-child(2){ animation-delay: .18s; }
  .typing span:nth-child(3){ animation-delay: .36s; }

  /* #5 — suggested follow-up chips */
  .chips { display: flex; flex-wrap: wrap; gap: 7px; padding: 2px 18px 6px; }
  .chip {
    border: 1px solid var(--line); background: var(--card); color: var(--teal-dark);
    border-radius: 15px; padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: var(--font); transition: background .14s, border-color .14s;
  }
  .chip:hover { background: var(--tint-teal); border-color: var(--teal); }

  .leadcard { display: flex; flex-direction: column; gap: 9px; }
  .leadcard input { padding: 11px 13px; border: 1px solid var(--line); border-radius: 12px; font-size: 13px; font-family: var(--font); outline: none; background: #fafcfc; }
  .leadcard input:focus { border-color: var(--teal); }
  .leadcard .submit { background: var(--navy); color: #fff; border: none; border-radius: 12px; padding: 11px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: var(--font); transition: background .15s; }
  .leadcard .submit:hover { background: var(--teal-dark); }

  .composer { flex-shrink: 0; padding: 8px 14px 10px; background: var(--bg); }
  .composer-row { display: flex; align-items: center; gap: 9px; background: var(--card); border-radius: 26px; padding: 6px 6px 6px 18px; box-shadow: var(--shadow-card); }
  .composer input { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; font-family: var(--font); color: var(--ink); padding: 8px 0; }
  .composer input::placeholder { color: var(--muted); }
  .send {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: #fff; cursor: pointer;
    flex-shrink: 0; display: grid; place-items: center; transition: transform .14s, opacity .14s;
  }
  .send:hover { transform: scale(1.06); }
  .send:active { transform: scale(.92); }
  .send:disabled { opacity: .45; cursor: default; }
  .send svg { width: 18px; height: 18px; }
  .disclaimer { text-align: center; font-size: 10px; color: var(--muted); padding: 7px 14px 2px; line-height: 1.4; }

  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes pop { from { opacity: 0; transform: translateY(6px) scale(.98); } to { opacity: 1; transform: none; } }
  @keyframes blink { 0%,60%,100%{opacity:.3} 30%{opacity:1} }
  .chat::-webkit-scrollbar, .welcome::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-thumb, .welcome::-webkit-scrollbar-thumb { background: #cdd9de; border-radius: 3px; }
  @media (prefers-reduced-motion: reduce) { .welcome, .chatwrap.show, .msg, .qcard { animation: none; transition: none; } }
</style>
</head>
<body>
<div class="shell">

  <div class="bar">
    <div class="avatar">W</div>
    <div class="bar-text">
      <h1>Windham Dental Group</h1>
      <p><span class="live-dot"></span> Ask me anything · available 24/7</p>
    </div>
    <button class="bar-action" id="homeBtn" title="Back to start" onclick="goHome()" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    </button>
  </div>

  <div class="welcome" id="welcome">
    <h1 class="hello">How can we<br><span class="accent">help your smile?</span></h1>
    <p class="sub">Hi! I'm the Windham Dental front desk assistant. Pick a topic or just start typing.</p>

    <div class="grid">
      <button class="qcard c-teal" onclick="quick('What are your hours?')">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
        <span><span class="lbl">Hours &amp; location</span></span>
      </button>
      <button class="qcard c-navy" onclick="quick('What services do you offer?')">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5.5C9 1 3 3 3 8c0 5 5 7 9 13 4-6 9-8 9-13 0-5-6-7-9-2.5z"/></svg></span>
        <span><span class="lbl">Our services</span></span>
      </button>
      <button class="qcard c-sand" onclick="quick('I want to request an appointment')">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg></span>
        <span><span class="lbl">Book a visit</span></span>
      </button>
      <button class="qcard c-rose" onclick="quick('I am a new patient, what do I need?')">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-8 0v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <span><span class="lbl">New patients</span></span>
      </button>
    </div>

    <button class="estrip" onclick="quick('I have a dental emergency')">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg></span>
      <span class="estrip-txt"><b>Dental emergency?</b><span>Tap for what to do right now</span></span>
      <span class="chev"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
    </button>
  </div>

  <div class="chatwrap" id="chatwrap">
    <div class="chat" id="chat"></div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="composer">
    <div class="composer-row">
      <input id="msg" type="text" placeholder="Type your question…" autocomplete="off"
             onkeydown="if(event.key==='Enter')send()">
      <button class="send" id="sendBtn" onclick="send()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
    <div class="disclaimer">Informational assistant only — not a substitute for professional advice. For emergencies call 911.</div>
  </div>

</div>

<script>
const WORKER_URL = "https://windham-dental.csgilbert.workers.dev";
const FORMSPREE_URL = "https://formspree.io/f/mqevkrbz";
const OFFICE_PHONE = "(603) 893-3891";

const LAYER_1_GUARDRAILS = `
You are an informational front-desk assistant embedded on a business website.
HARD RULES — never break these:
- You are NOT a medical professional. Never diagnose, never recommend treatment, never interpret symptoms clinically. Redirect anything clinical to "please call the office and our team can help."
- Never collect, store, or ask for sensitive health information, insurance ID numbers, SSNs, or full dates of birth. You may take a name, phone, email, and a short reason for the visit ONLY to pass an appointment request to staff.
- Never invent facts. If something is not in your knowledge base below, say you are not sure and direct them to call the office.
- Never quote exact prices or guarantee insurance coverage. Say the office can confirm costs and coverage directly.
- Keep replies SHORT and warm: 1-3 sentences. Do NOT repeat a link, phone number, or fact you already gave earlier in this same conversation.
- For any emergency or severe pain/injury: tell them to call the office immediately, and for life-threatening issues call 911.
`;

const LAYER_2_VERTICAL = `
You serve a dental practice. Your jobs, in priority order:
1. Answer common questions (hours, location, services, new-patient process, insurance/payment generally).
2. Capture appointment requests — collect name, phone, best time to reach them, and reason for visit, then tell them the front desk will confirm. Offer the online Appointment Request page ONCE as a backup, not repeatedly.
3. Encourage new patients to complete forms in advance.
Tone: friendly small-town practice, reassuring to anxious patients. Never pushy.
HIPAA boundary: you are strictly informational. Do not gather clinical/patient health detail beyond a one-line reason for the visit.

LEAD CAPTURE — IMPORTANT:
When you have collected BOTH a name AND a phone number for an appointment request, end your reply with a hidden tag on its very last line, exactly in this format and nothing after it:
[LEAD] name="..." phone="..." reason="..." [/LEAD]
Fill in what the patient gave (reason can be brief or "not specified"). Do NOT explain the tag or mention it — the user never sees it. Write your normal friendly confirmation message above it as usual.
`;

const LAYER_3_CLIENT = `
PRACTICE: Windham Dental Group — a local, trusted family & cosmetic dental practice in Windham, NH.
PHONE: (603) 893-3891
APPOINTMENT REQUEST PAGE: https://www.windhamdentalgroupnh.com/appointment
NEW PATIENT PAGE: https://www.windhamdentalgroupnh.com/new-patients
SERVICES PAGE: https://www.windhamdentalgroupnh.com/dental-services
CONTACT PAGE: https://www.windhamdentalgroupnh.com/contact

HOURS:
- Monday: Closed
- Tuesday: 7:00 AM – 6:00 PM
- Wednesday: 7:00 AM – 4:00 PM
- Thursday: Closed
- Friday: 7:00 AM – 12:00 PM
- Saturday: 2nd Saturday of each month only, 8:30 AM – 1:30 PM (cleanings + emergencies)
- Sunday: Closed

SERVICES OFFERED:
General/family dentistry, teeth cleanings & exams, fillings, teeth whitening, dental implants,
crowns & bridgework, porcelain veneers, bonding, removable dentures, sealants (children),
oral cancer screenings, periodontal (gum) disease therapy, orthodontic treatment,
TMJ/TMD treatment, tooth extractions, and emergency dental treatment.

NEW PATIENTS:
First visit collects medical history and background. Patients can save time by printing and
completing forms in advance. Forms available on the New Patients page: Welcome Form, Medical
History Form, Phone Policy Form, Office Policy Form, Office Procedure Consent Form, HIPAA Form.

EMERGENCIES:
For life-threatening or severe injury, call 911 or go to the nearest ER. The practice treats
chipped, moved, or knocked-out teeth — patients should call the office for assistance.

PAYMENT/INSURANCE: The office can confirm accepted insurance and costs directly — do not quote specifics.
`;

const SYSTEM_PROMPT = LAYER_1_GUARDRAILS + "\n" + LAYER_2_VERTICAL + "\n" + LAYER_3_CLIENT;

const chat = document.getElementById('chat');
const input = document.getElementById('msg');
const sendBtn = document.getElementById('sendBtn');
const welcome = document.getElementById('welcome');
const chatwrap = document.getElementById('chatwrap');
const homeBtn = document.getElementById('homeBtn');
const chipsBar = document.getElementById('chips');
let history = [];
let started = false;

function enterChat() {
  if (started) return;
  started = true;
  welcome.classList.add('hide');
  chatwrap.classList.add('show');
  homeBtn.style.display = 'grid';
  addMsg("Hi! I'm the front desk assistant for Windham Dental Group. How can I help?", 'bot');
}

function goHome() {
  started = false;
  history = [];
  chat.innerHTML = '';
  clearChips();
  chatwrap.classList.remove('show');
  welcome.classList.remove('hide');
  homeBtn.style.display = 'none';
}

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.innerHTML = linkify(text);
  chat.appendChild(div);
  scrollDown();
  return div;
}
function linkify(t) {
  return t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
          .replace(/\((\d{3})\)\s?(\d{3})-(\d{4})/g, '<a href="tel:+1$1$2$3">($1) $2-$3</a>');
}
function scrollDown() { chat.scrollTop = chat.scrollHeight; }
function showTyping() {
  const t = document.createElement('div');
  t.className = 'typing'; t.id = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(t); scrollDown();
}
function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

/* #5 — suggested follow-up chips */
function clearChips() { chipsBar.innerHTML = ''; }
function showChips(list) {
  clearChips();
  list.forEach(label => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = label;
    b.onclick = () => { clearChips(); input.value = label; send(); };
    chipsBar.appendChild(b);
  });
}
const DEFAULT_CHIPS = ['What are your hours?', 'Book a visit', 'Our services'];

function quick(text) {
  enterChat();
  input.value = text;
  send();
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  enterChat();
  clearChips();
  addMsg(text, 'user');
  history.push({ role: 'user', parts: [{ text }] });
  input.value = '';
  sendBtn.disabled = true;
  showTyping();

  try {
    let reply = await callGemini();
    hideTyping();

    // #4 — intercept hidden lead tag, fire Formspree, strip it from view
    reply = handleLeadTag(reply);

    // #3 — emergency replies get tappable call buttons
    const isEmergency = /\b911\b|emergency room|nearest ER/i.test(reply);
    const node = addMsg(reply, 'bot');
    if (isEmergency) appendEmergencyButtons(node);

    history.push({ role: 'model', parts: [{ text: reply }] });
    showChips(DEFAULT_CHIPS);
  } catch (e) {
    hideTyping();
    fallback(text);
  }
  sendBtn.disabled = false;
  input.focus();
}

async function callGemini() {
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: history,
      generationConfig: { temperature: 0.4, maxOutputTokens: 300 }
    })
  });
  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  const out = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!out) throw new Error('Empty response');
  return out.trim();
}

/* #4 — parse [LEAD]...[/LEAD], send to Formspree, remove from displayed text */
function handleLeadTag(reply) {
  const m = reply.match(/\[LEAD\]([\s\S]*?)\[\/LEAD\]/i);
  if (!m) return reply;
  const block = m[1];
  const grab = (k) => { const r = block.match(new RegExp(k + '="([^"]*)"', 'i')); return r ? r[1].trim() : ''; };
  const name = grab('name'), phone = grab('phone'), reason = grab('reason');
  if (name && phone) {
    fetch(FORMSPREE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ name, phone, reason, source: 'Windham Dental chatbot (in-chat request)' })
    }).catch(() => {});
  }
  return reply.replace(m[0], '').trim();
}

/* #3 — render prominent call buttons under an emergency reply */
function appendEmergencyButtons(node) {
  const wrap = document.createElement('div');
  wrap.className = 'emergency-actions';
  const tel = OFFICE_PHONE.replace(/[^\d]/g, '');
  wrap.innerHTML = `
    <a class="ecall is-911" href="tel:911">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg>
      <span>Call 911<small>Life-threatening or severe injury</small></span>
    </a>
    <a class="ecall is-office" href="tel:+1${tel}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg>
      <span>Call the office<small>${OFFICE_PHONE} · chipped or knocked-out tooth</small></span>
    </a>`;
  node.appendChild(wrap);
  scrollDown();
}

function fallback(lastText) {
  addMsg(
    "I'm having trouble connecting right now, but I can still help. " +
    "For anything urgent please call us at " + OFFICE_PHONE + ". " +
    "Or leave your name and number below and the front desk will reach out.",
    'bot'
  );
  showLeadForm();
}

function showLeadForm() {
  if (document.getElementById('leadForm')) return;
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'leadForm';
  wrap.innerHTML = `
    <div class="leadcard">
      <input id="lf-name" placeholder="Your name">
      <input id="lf-phone" placeholder="Phone number">
      <input id="lf-reason" placeholder="Reason for visit (optional)">
      <button class="submit" onclick="submitLead()">Request a callback</button>
    </div>`;
  chat.appendChild(wrap);
  scrollDown();
}

function submitLead() {
  const name = document.getElementById('lf-name').value.trim();
  const phone = document.getElementById('lf-phone').value.trim();
  const reason = document.getElementById('lf-reason').value.trim();
  if (!name || !phone) { alert('Please add your name and phone.'); return; }
  const form = document.getElementById('leadForm');
  if (form) form.remove();
  fetch(FORMSPREE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({ name, phone, reason, source: 'Windham Dental chatbot (fallback form)' })
  }).catch(() => {});
  addMsg(`Thank you, ${name}! We have received your request and the front desk will call ${phone} soon. For anything urgent, call ${OFFICE_PHONE}.`, 'bot');
}
</script>
</body>
</html>
